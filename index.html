<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <title>PokePrep</title>
</head>
<body>
    <header>
        <h1 class="website-name"><span style="color: red;">Poke</span>Prep</h1>
        <h3>Build better teams.</h3>
    </header>

    <main>
        <ul class="gen-select">
            <li class="left-edge">DPP</li>
            <li>B/W</li>
            <li>X/Y</li>
            <li>S/M</li>
            <li>S/S</li>
            <li class="right-edge">S/V</li>
        </ul>

        <div class="middle">
            <div class="team-area">
                <h3>Your Team:</h3>

                <div class="team">
                    
                    <div class="pokemon-card">
                        <div class="left">
                            <div class="combobox">
                                <input type="text" id="combo-input-p1" placeholder="Name" autocomplete="off" />
                                <ul id="combo-list" class="options hidden">
                                    <li>Test</li>
                                    <li>Test</li>
                                </ul>
                            </div>
                        </div>

                        <div class="right">
                            <div class ="combobox">
                                <input type="text" id="combo-input-m1" placeholder="Move 1" autocomplete="off" />
                                <ul id="combo-list" class="options hidden">
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="pokemon-card">
                        <div class="left">
                            <div class="combobox">
                                <input type="text" id="combo-input-p1" placeholder="Name" autocomplete="off" />
                                <ul id="combo-list" class="options hidden">
                                    <li>Test</li>
                                    <li>Test</li>
                                </ul>
                            </div>
                        </div>

                        <div class="right">
                            <div class ="combobox">
                                <input type="text" id="combo-input-m1" placeholder="Move 1" autocomplete="off" />
                                <ul id="combo-list" class="options hidden">
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="connector">
                <h3>Matchup/Speed/Calc:</h3>
            </div>
            <div class="team-area">
                <h3>Opponent Team:</h3>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
