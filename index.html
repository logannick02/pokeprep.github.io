<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <title>PokePrep</title>
</head>
<body>
    <header>
        <h1 class="website-name"><span style="color: red;">Poke</span>Prep</h1>
        <h3>Build better teams.</h3>
    </header>

    <main>
        <ul class="gen-select">
            <li class="left-edge">DPP</li>
            <li>B/W</li>
            <li>X/Y</li>
            <li>S/M</li>
            <li>S/S</li>
            <li class="right-edge">S/V</li>
        </ul>

        <div class="middle">
            <div class="team-box">
                <p>Your Team:</p>
            </div>
            <div class="connector">
                <p>Matchup/Speed/Calc</p>
            </div>
            <div class="team-box">
                <p>Opponent Team:</p>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
